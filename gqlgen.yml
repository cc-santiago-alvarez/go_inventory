schema:
  - graphql/schema/*.graphqls

exec:
  filename: graphql/generated/generated.go
  package: generated

resolver:
  layout: follow-schema
  dir: graphql/resolvers
  package: resolvers
  filename_template: "{name}.resolvers.go"

model:
  filename: graphql/generated/models_gen.go
  package: generated

models:
  Product:
    model: github.com/cc-santiago-alvarez/go_inventory.git/models.Product
  ProductCategory:
    model: github.com/cc-santiago-alvarez/go_inventory.git/models.ProductCategory
  Category:
    model: github.com/cc-santiago-alvarez/go_inventory.git/models.Category
  CategoryWithProducts:
    model: github.com/cc-santiago-alvarez/go_inventory.git/models.CategoryWithProducts
  Movement:
    model: github.com/cc-santiago-alvarez/go_inventory.git/models.Movement
  MovementType:
    model: github.com/cc-santiago-alvarez/go_inventory.git/models.MovementType
  CreateMovementInput:
    model: github.com/cc-santiago-alvarez/go_inventory.git/models.CreateMovementRequest